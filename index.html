<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMKM UNIQ QWE</title>
<link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
<div class="page-wrap">
  <section class="hero-panel">
    <div class="hero-brand">
      <div class="hero-icon">🛒</div>
      <h1>UMKM UNIQ QWE</h1>
      <p class="hero-tagline">Sistem Point of Sale</p>
      <p class="hero-tagline">Manajemen Keuangan UMKM</p>
    </div>

    <div class="hero-copy">
      
    </div>

    <div class="hero-badges">
    
    </div>
  </section>

  <main class="login-card">
    <h2>Login</h2>
    <p>Masuk untuk melanjutkan</p>

    <label>
      <span>Username</span>
      <input type="text" id="username" placeholder="Username">
    </label>

    <label>
      <span>Password</span>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Masukkan password">
        <button type="button" class="toggle-password" onclick="togglePassword()" aria-label="Tampilkan password">👁️</button>
      </div>
    </label>

    <label>
      <span>Pilih Role</span>
      <select id="role">
        <option value="admin">Admin</option>
        <option value="kasir">Kasir</option>
        <option value="ceo">CEO</option>
      </select>
    </label>

    <button onclick="login()">Login</button>
  </main>
</div>

<script src="assets/js/data.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>
